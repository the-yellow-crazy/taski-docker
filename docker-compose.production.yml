volumes:
  pg_data_production:
  static_volume:

services:
  db:
    image: postgres:13.10
    env_file: .env
    restart: unless-stopped
    volumes:
      - pg_data_production:/var/lib/postgresql/data

  backend:
    image: yellowcrazy/taski_backend
    env_file: .env
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - static_volume:/backend_static

  frontend:
    image: yellowcrazy/taski_frontend
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static

  gateway:
    image: yellowcrazy/taski_gateway
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - static_volume:/staticfiles
    ports:
      - 8000:80
